name: Playwright Tests

on:
    push:
        branches: [master, main, develop]
    pull_request:
        branches: [master, main]
    schedule:
        - cron: '0 5 * * *' # Midnight EST (Florida)
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment'
                required: true
                default: 'dev'
                type: choice
                options: [dev, stage, prod]
            test_suite:
                description: 'Choose test suite to run'
                required: true
                default: '@smoke'
                type: choice
                options: ['@smoke', '@regression', '@ui', '@api', 'all']
            browser:
                description: 'Choose browser'
                required: true
                default: 'chromium'
                type: choice
                options: [chromium, firefox, webkit, all]
            telegram_chat_id:
                description: 'Telegram Chat ID for notifications'
                required: false
                default: ''

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    test:
        timeout-minutes: 30
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps

            - name: Run Playwright tests
              run: |
                  TAG_VALUE="${{ github.event.inputs.test_suite || 'all' }}"
                  BROWSER_VALUE="${{ github.event.inputs.browser || 'all' }}"
                  
                  ARGS=""
                  if [ "$TAG_VALUE" != "all" ]; then ARGS="$ARGS --grep \"$TAG_VALUE\""; fi
                  if [ "$BROWSER_VALUE" != "all" ]; then ARGS="$ARGS --project=\"$BROWSER_VALUE\""; fi
                  
                  echo "🚀 Executing: npx playwright test $ARGS"
                  npx playwright test $ARGS
              env:
                  ENV: ${{ github.event.inputs.environment || 'dev' }}
              continue-on-error: true

            - name: Get Allure history
              uses: actions/checkout@v4
              if: always()
              continue-on-error: true
              with:
                  ref: gh-pages
                  path: gh-pages

            - name: Generate Allure Report
              if: always()
              run: |
                  mkdir -p allure-results/history
                  cp -r gh-pages/history/* allure-results/history/ || true
                  npm run allure:generate

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              if: always()
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: allure-report
                  publish_branch: gh-pages

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: allure-report
                  path: allure-report/
                  retention-days: 30

            - name: Send Telegram Notification
              if: always()
              run: |
                  CHAT_ID="${{ github.event.inputs.telegram_chat_id }}"
                  if [ -n "$CHAT_ID" ]; then
                    CONCLUSION="${{ job.status }}"
                    MESSAGE="🏁 <b>Tests Complete!</b>%0AStatus: <b>$CONCLUSION</b>%0AEnvironment: <b>${{ github.event.inputs.environment }}</b>%0ASuite: <b>${{ github.event.inputs.test_suite }}</b>%0A%0A🔗 <a href='https://ihormynaiev-art.github.io/360covered/'>View Allure Report</a>"
                    curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d chat_id=$CHAT_ID -d text="$MESSAGE" -d parse_mode=HTML
                  fi
